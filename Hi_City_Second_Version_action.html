  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      var mapPage = document.getElementById('map-page');
      var matchPage = document.getElementById('match-page');
      var checkinPage = document.getElementById('checkin-page');
      if (stage === '2') {
        var ckClose = document.getElementById('ck-close');
        var matchBack = document.getElementById('match-back');
        var mapBack = document.getElementById('map-back');
        if (checkinPage && checkinPage.classList.contains('on') && ckClose) ckClose.click();

        if (mapPage && mapPage.classList.contains('on') && mapBack) mapBack.click();
        setTopTabActive('discover');
        return;
      }
      if (stage === '3') {
        openMapStage();
        return;

      if (stage === '4') {
        openMapStage();
        setTimeout(function () {
          var goMatch = document.getElementById('go-match');

    function updatePersonaSignal() {
      var tags = personaTagsFlat();
      var story = (personaText && personaText.value ? personaText.value.trim() : '');
      var hasInput = tags.length > 0 || story.length > 0;
      if (personaSignal) personaSignal.hidden = !hasInput;
      if (personaSignalTags) personaSignalTags.textContent = tags.length ? tags.join('、') : '（未选择）';
      if (personaSignalStory) personaSignalStory.textContent = story || '（未填写）';
      if (personaSignalCount) personaSignalCount.textContent = String(tags.length + (story ? 1 : 0));
    }
    if (personaText && previewText) personaText.addEventListener('input', function () {
      previewText.textContent = personaText.value.trim();
      updatePersonaSignal();
    });
    personaSheet.querySelectorAll('.xhs-p-ex').forEach(function (b) {
      b.addEventListener('click', function () {
        if (!personaText) return;
        personaText.value = b.textContent;
        if (previewText) previewText.textContent = b.textContent;
        updatePersonaSignal();
      });
    });

    function switchPersonaPanel(panel) {
      personaSheet.querySelectorAll('.xhs-p-tab').forEach(function (t) { t.classList.toggle('on', t.getAttribute('data-panel') === panel); });
      personaSheet.querySelectorAll('.xhs-p-card[data-panel]').forEach(function (v) { v.hidden = v.getAttribute('data-panel') !== panel; });
    }
    personaSheet.querySelectorAll('.xhs-p-tab').forEach(function (t) {
      t.addEventListener('click', function () { switchPersonaPanel(t.getAttribute('data-panel')); });
    });

    function openPersonaPanel() {
      if (!personaSheet.classList.contains('on')) {
        personaPrevStage = getVisualStage();
      }
      closeScenePage();
      setVisualStage('1');
      personaMask.classList.add('on');
      personaSheet.classList.add('on');
    }
    function closePersonaPanel() {
      personaMask.classList.remove('on');
      personaSheet.classList.remove('on');
      if (personaPrevStage) {
        setVisualStage(personaPrevStage);
      }
    }
    var personaPrevStage = '';
    function getVisualStage() {
      var activeRow = document.querySelector('.step-rail .row.on[data-s]');
      if (activeRow) return activeRow.getAttribute('data-s');
      var activeDot = document.querySelector('.stepper i.on[data-s]');
      if (activeDot) return activeDot.getAttribute('data-s');
      return '';
    }
    function setVisualStage(stage) {
      if (!stage) return;
      document.querySelectorAll('.step-rail .row[data-s]').forEach(function (row) {
        row.classList.toggle('on', row.getAttribute('data-s') === stage);
      });
      document.querySelectorAll('.stepper i[data-s]').forEach(function (dot) {
        dot.classList.toggle('on', dot.getAttribute('data-s') === stage);
      });
    }
    var openPersonaBtn = document.getElementById('open-persona');
    function triggerPersonaEntry() {
      if (openPersonaBtn) {
        openPersonaBtn.click();
      } else {
        openPersonaPanel();
      }
    }
    if (openPersonaBtn) {
      openPersonaBtn.addEventListener('click', function () {
        setTimeout(openPersonaPanel, 0);
      }, true);
    }
    var stagePersonaRow = document.querySelector('.step-rail .row[data-s="1"]');
    if (stagePersonaRow) {
      stagePersonaRow.addEventListener('click', function (e) {
        e.preventDefault();
        triggerPersonaEntry();
      });
    }
    personaMask.addEventListener('click', closePersonaPanel);
    var pClose = personaSheet.querySelector('.xhs-p-close');
    if (pClose) pClose.addEventListener('click', closePersonaPanel);
    var pClear = personaSheet.querySelector('#xhs-p-clear');
    if (pClear) pClear.addEventListener('click', function () {
      personaState = { who: '', familiarity: '', social: '', interests: [] };
      renderPersonaTags();
      if (personaText) personaText.value = '';
      if (previewText) previewText.textContent = '';
      updatePersonaSignal();
    });
    function buildPersonaKeywords() {
      var tags = personaTagsFlat();
      var story = personaText ? personaText.value.trim() : '';
      var kws = tags.slice();
      if (/雨|下雨|雨天/.test(story)) kws.push('雨天语境');
      if (/下班|傍晚|周五/.test(story)) kws.push('下班时段');
      if (/演出|展|书店|画廊/.test(story)) kws.push('文化偏好');
      if (/安静|慢|发呆/.test(story)) kws.push('慢节奏');
      var unique = [];
      kws.forEach(function (k) { if (k && unique.indexOf(k) === -1) unique.push(k); });
      return unique.slice(0, 10);
    }
    function buildSceneBatch(seed) {
      var city = cityNameEl.textContent || '南京';
      var tags = personaTagsFlat();
      var story = personaText ? personaText.value.trim() : '';
      var coreA = tags[0] || '慢慢探索';
      var coreB = tags[1] || '美食探店';
      var coreC = tags[2] || '看展演出';
      var rainy = /雨|下雨|雨天/.test(story);
      var pool = [
        city + coreA + '夜景散步消食线',
        city + coreB + '小店连逛路线',
        city + coreC + '展演+咖啡拼接线',
        city + '周末熟人小聚不重样小店',
        city + '安静独处漫游线',
        city + '地铁可达的轻社交路线',
        city + '晚饭后两小时松弛逛法',
        city + '城市肌理慢走+拍照路线',
        city + '书店画廊半日漫游线',
        city + '晚间热饮与夜风路线'
      ];
      if (rainy) pool.unshift(city + '雨雪天室内展 + 热饮地图');
      var start = seed % pool.length;
      var out = [];
      for (var i = 0; i < 6; i += 1) out.push(pool[(start + i) % pool.length]);
      return out;
    }
    var personaSceneState = { keywords: [], scenes: [], selected: [] };
    var scenePage = document.createElement('section');
    scenePage.className = 'xhs-p-scene';
    scenePage.hidden = true;
    scenePage.innerHTML = '' +
      '<button class="xhs-scene-back" type="button">← 返回编辑手记</button>' +
      '<div class="xhs-scene-title">Persona 关键词</div>' +
      '<div class="xhs-scene-keywords" id="xhs-scene-keywords"></div>' +
      '<div class="xhs-scene-title">匹配场景词</div>' +
      '<div class="xhs-scene-list" id="xhs-scene-list"></div>' +
      '<div class="xhs-scene-actions">' +
        '<button class="xhs-scene-change" type="button">换一批</button>' +
        '<button class="xhs-scene-generate" type="button">生成推荐内容</button>' +
      '</div>';
    personaSheet.appendChild(scenePage);
    function renderScenePage() {
      var kwsRoot = scenePage.querySelector('#xhs-scene-keywords');
      var listRoot = scenePage.querySelector('#xhs-scene-list');
      kwsRoot.innerHTML = '';
      personaSceneState.keywords.forEach(function (k) {
        var el = document.createElement('span');
        el.className = 'xhs-scene-keyword';
        el.textContent = k;
        kwsRoot.appendChild(el);
      });
      listRoot.innerHTML = '';
      personaSceneState.scenes.forEach(function (s) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'xhs-scene-item' + (personaSceneState.selected.indexOf(s) > -1 ? ' on' : '');
        b.textContent = s;
        b.addEventListener('click', function () {
          if (personaSceneState.selected.indexOf(s) > -1) {
            personaSceneState.selected = personaSceneState.selected.filter(function (v) { return v !== s; });
          } else {
            if (personaSceneState.selected.length >= 3) personaSceneState.selected.shift();
            personaSceneState.selected.push(s);
          }
          renderScenePage();
        });
        listRoot.appendChild(b);
      });
    }
    function openScenePage() {
      personaSceneState.keywords = buildPersonaKeywords();
      personaSceneState.scenes = buildSceneBatch(Date.now() % 97);
      personaSceneState.selected = personaSceneState.scenes.slice(0, 2);
      renderScenePage();
      scenePage.hidden = false;
    }
    function closeScenePage() {
      scenePage.hidden = true;
    }
    scenePage.querySelector('.xhs-scene-back').addEventListener('click', closeScenePage);
    scenePage.querySelector('.xhs-scene-change').addEventListener('click', function () {
      personaSceneState.scenes = buildSceneBatch((Date.now() + 23) % 97);
      personaSceneState.selected = personaSceneState.scenes.slice(0, 2);
      renderScenePage();
    });
    function applyPersonaToDiscover() {
      var city = cityNameEl.textContent || '南京';
      var selected = personaSceneState.selected.length ? personaSceneState.selected : personaSceneState.scenes.slice(0, 2);
      var tags = personaTagsFlat();
      var story = personaText ? personaText.value.trim() : '';
      var hero = discoverLayer.querySelector('.xhs-hero-title');
      if (hero) hero.textContent = city + (selected[0] ? selected[0].replace(city, ' ') : '慢游小分队');
      var quote = discoverLayer.querySelector('.xhs-note-cover.quote .qt');
      if (quote) quote.innerHTML = '今晚的你<br>是一个' + (tags[0] || '想慢慢探索') + '这座城市的人';
      var titles = discoverLayer.querySelectorAll('.xhs-note-title');
      if (titles[0]) titles[0].textContent = selected[0] || (city + '同城慢游路线');
      if (titles[1]) titles[1].textContent = selected[1] || (city + '轻松散步路线');
      if (titles[2]) titles[2].textContent = selected[2] || (city + '晚间不拥挤逛法');
      var tagEl = discoverLayer.querySelector('.xhs-note-tag');
      if (tagEl) tagEl.textContent = '和你「' + (tags.slice(0, 2).join('、') || '慢慢探索') + '」很贴';
      var meta = discoverLayer.querySelectorAll('.xhs-note-meta span:first-child');
      if (meta[1]) meta[1].textContent = '🔴 ' + (tags[0] || '城市灵感');
      if (meta[2]) meta[2].textContent = '🔴 ' + (tags[1] || '本地闲逛');
      if (story && previewText) previewText.textContent = story;
    }
    scenePage.querySelector('.xhs-scene-generate').addEventListener('click', function () {
      applyPersonaToDiscover();
      closeScenePage();
      closePersonaPanel();
      setTopTabActive('discover');
      setActiveBar('inspire');
      setVisualStage('2');
      if (typeof window.showToast === 'function') window.showToast('已刷新刷灵感内容');
    });
    var pSave = personaSheet.querySelector('#xhs-p-save');
    function handleSaveToScenes() {
      updatePersonaSignal();
      openScenePage();
    }
    if (pSave) pSave.addEventListener('click', handleSaveToScenes);
    if (personaSignal) personaSignal.addEventListener('dblclick', handleSaveToScenes);
    updatePersonaSignal();

    var panel = document.createElement('section');
    panel.className = 'xhs-city-panel';
    panel.innerHTML = '' +
      '<div class="xhs-city-head">' +
        '<button class="xhs-city-back" aria-label="返回">‹</button>' +
        '<input class="xhs-city-search" placeholder="搜索城市" />' +
      '</div>' +
      '<div class="xhs-city-tabs">' +
        '<button class="xhs-city-tab active" data-pane="domestic">国内城市</button>' +
        '<button class="xhs-city-tab" data-pane="overseas">海外城市</button>' +
      '</div>' +
      '<div class="xhs-city-body">' +
        '<div class="xhs-pane" data-pane="domestic">' +
          '<div class="xhs-sub">定位/当前选中的城市</div>' +
          '<button class="xhs-current" data-city="南京">南京</button>' +
          '<div class="xhs-block"><div class="xhs-sub">热门城市</div><div class="xhs-grid" id="xhs-dom-grid"></div></div>' +
        '</div>' +
        '<div class="xhs-pane" data-pane="overseas" hidden>' +
          '<div class="xhs-over">' +
            '<aside class="xhs-region-col" id="xhs-region-col"></aside>' +
            '<div class="xhs-over-body">' +
              '<div class="xhs-sub">定位/当前选中的城市</div>' +
              '<button class="xhs-current" data-city="南京">南京</button>' +
              '<div class="xhs-block"><div class="xhs-sub">热门城市</div><div class="xhs-grid" id="xhs-over-grid"></div></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    var mask = document.createElement('div');
    mask.className = 'xhs-city-mask';

    var frame = tabsWrap.closest('.frame') || document.querySelector('.frame');
    var screen = frame || tabsWrap.closest('.app') || document.body;
    screen.appendChild(mask);
    screen.appendChild(panel);

    var domCities = ['北京','上海','成都','深圳','广州','重庆','西安','武汉','杭州','郑州','南京','长沙'];
    var overRegions = {
      '当前城市':['南京'],
      '亚洲':['新加坡','吉隆坡','大阪','首尔','清迈','马累'],
      '北美洲':['纽约','旧金山','温哥华','多伦多','蒙特利尔','墨西哥城'],
      '欧洲':['米兰','巴黎','莫斯科','柏林','阿姆斯特丹','苏黎世'],
      '大洋洲':['悉尼','墨尔本','奥克兰','黄金海岸'],
      '非洲':['开罗','卡萨布兰卡','开普敦']
    };

    var domGrid = panel.querySelector('#xhs-dom-grid');
    var overGrid = panel.querySelector('#xhs-over-grid');
    var regionCol = panel.querySelector('#xhs-region-col');
    var activeRegion = '亚洲';
    function syncDiscoverCity(name) {
      if (!discoverLayer) return;
      discoverLayer.querySelectorAll('.xhs-discover-city').forEach(function (el) { el.textContent = name; });
      discoverLayer.querySelectorAll('.xhs-nearby-city').forEach(function (el) { el.textContent = name; });
      if (personaSheet) personaSheet.querySelectorAll('.xhs-discover-city').forEach(function (el) { el.textContent = name; });
    }

    function pickCity(name) {
      cityNameEl.textContent = name;
      panel.querySelectorAll('.xhs-current').forEach(function (el) { el.textContent = name; });
      syncDiscoverCity(name);
      closePanel();
    }
    function renderGrid(root, arr) {
      root.innerHTML = '';
      arr.forEach(function (name) {
        var b = document.createElement('button');
        b.className = 'xhs-chip';
        b.textContent = name;
        b.addEventListener('click', function () { pickCity(name); });
        root.appendChild(b);
      });
    }
    function renderRegions() {
      regionCol.innerHTML = '';
      Object.keys(overRegions).forEach(function (r) {
        var b = document.createElement('button');
        b.className = 'xhs-region' + (r === activeRegion ? ' active' : '');
        b.textContent = r;
        b.addEventListener('click', function () { activeRegion = r; renderRegions(); renderGrid(overGrid, overRegions[r] || []); });
        regionCol.appendChild(b);
      });
    }

    renderGrid(domGrid, domCities);
    renderRegions();
    renderGrid(overGrid, overRegions[activeRegion]);

    function openPanel() {
      panel.classList.add('on');
      mask.classList.add('on');
      setTopTabActive('discover');
      cityTab.classList.add('active');
    }
    function closePanel() {
      panel.classList.remove('on');
      mask.classList.remove('on');
      cityTab.classList.remove('active');
    }

    cityTab.addEventListener('click', openPanel);
    panel.querySelector('.xhs-city-back').addEventListener('click', closePanel);
    mask.addEventListener('click', closePanel);

    panel.querySelectorAll('.xhs-current').forEach(function (el) {
      el.addEventListener('click', function () { pickCity(el.textContent.trim()); });
    });

    panel.querySelectorAll('.xhs-city-tab').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var pane = btn.getAttribute('data-pane');
        panel.querySelectorAll('.xhs-city-tab').forEach(function (t) { t.classList.toggle('active', t === btn); });
        panel.querySelectorAll('.xhs-pane').forEach(function (p) { p.hidden = p.getAttribute('data-pane') !== pane; });
      });
    });

    syncDiscoverCity(cityNameEl.textContent.trim());
    syncBarFromStage();
    setTopTabActive('discover');
    return true;
  }

  var retries = 0;
  var timer = setInterval(function () {
    retries += 1;
    if (applyEnhancer() || retries > 80) clearInterval(timer);
  }, 150);
})();
</script>
<!-- xhs-city-enhancer -->
</body>
</html>
